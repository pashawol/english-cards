<!doctype html>
<html>
  <body style="background:#1a1a18;display:flex;gap:20px;padding:20px;flex-wrap:wrap">
    <canvas id="c192" width="192" height="192"></canvas>
    <canvas id="c512" width="512" height="512"></canvas>
    <canvas id="c192m" width="192" height="192"></canvas>
    <br />
    <div style="color:white;font-family:sans-serif">
      Right-click each canvas → Save image as...<br />
      c192 → icon-192.png<br />
      c512 → icon-512.png<br />
      c192m → icon-192-maskable.png
    </div>
    <script>
      function draw(id, size, maskable) {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext('2d');
        const pad = maskable ? size * 0.15 : size * 0.1;
        const r = maskable ? 0 : size * 0.22;

        // background
        ctx.fillStyle = '#1a1a18';
        if (maskable) {
          ctx.fillRect(0, 0, size, size);
        } else {
          ctx.beginPath();
          ctx.roundRect(0, 0, size, size, r);
          ctx.fill();
        }

        // accent dot
        const dotR = size * 0.08;
        ctx.fillStyle = '#c4873a';
        ctx.beginPath();
        ctx.arc(size / 2, size * 0.35, dotR, 0, Math.PI * 2);
        ctx.fill();

        // EC text
        ctx.fillStyle = '#fffdf8';
        ctx.font = `500 ${size * 0.28}px "DM Mono", monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('EC', size / 2, size * 0.65);
      }

      draw('c192', 192, false);
      draw('c512', 512, false);
      draw('c192m', 192, true);
    </script>
  </body>
</html>
